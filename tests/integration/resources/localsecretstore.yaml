apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: localsecretstore
spec:
  type: secretstores.local.file
  metadata:
  - name: secretsFile
    # Relative to the Dapr process CWD (tests/integration/), set by
    # DaprTestEnvironment via cwd=INTEGRATION_DIR.
    value: secrets.json
  - name: nestedSeparator
    value: ":"
