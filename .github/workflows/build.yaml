name: dapr-python

on:
  push:
    branches:
      - main
      - feature/*
  pull_request:
    branches:
      - main
      - release-*
      - feature/*
  workflow_dispatch:
  merge_group:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
    - name: Install uv
      uses: astral-sh/setup-uv@v7
    - name: Install dependencies
      run: uv sync --frozen --all-packages --group dev
    - name: Run Autoformatter
      run: |
        uv run ruff check --fix && uv run ruff format
        statusResult=$(git status -u --porcelain)
        if [ -z "$statusResult" ]
        then
            exit 0
        else
            echo "Source files are not formatted correctly. Run 'uv run ruff check --fix && uv run ruff format'."
            exit 1
        fi
    - name: Verify main is on a .dev version
      if: github.ref == 'refs/heads/main' || github.base_ref == 'main'
      run: |
        uv run python -c "
        from importlib.metadata import version
        package_version = version('dapr')
        assert '.dev' in package_version, (
            f'main version must contain .dev (got {package_version!r}); see RELEASE.md'
        )
        "

  build:
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python_version: "3.10"
            tox_env: py310
          - os: ubuntu-latest
            python_version: "3.11"
            tox_env: py311
          - os: ubuntu-latest
            python_version: "3.12"
            tox_env: py312
          - os: ubuntu-latest
            python_version: "3.13"
            tox_env: py313
          - os: ubuntu-latest
            python_version: "3.14"
            tox_env: py314
          - os: windows-latest
            python_version: "3.10"
            tox_env: py310
          - os: windows-latest
            python_version: "3.13"
            tox_env: py313
          - os: macos-latest
            python_version: "3.10"
            tox_env: py310
          - os: macos-latest
            python_version: "3.13"
            tox_env: py313
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python_version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python_version }}
    - name: Install uv
      uses: astral-sh/setup-uv@v7
    - name: Install dependencies
      run: uv sync --frozen --all-packages --group dev
    - name: Check Typing
      run: uv run mypy
    - name: Run unit-tests
      run: |
        uv run coverage run -m pytest tests ext -m "not e2e" --ignore=tests/integration --ignore=tests/examples --import-mode=importlib
        uv run coverage xml
    - name: Upload test coverage
      uses: codecov/codecov-action@v6
